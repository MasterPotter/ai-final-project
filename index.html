<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Olympiad Problem Catalog (MOHS Edition)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .math-scroll { overflow-x: auto; overflow-y: hidden; }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <!-- Navbar -->
    <nav class="bg-blue-800 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wider mb-2 md:mb-0">🏛️ Elite Math Olympiad Archive</h1>
            <p class="text-sm text-blue-200">Powered by the MOHS Hardness Scale</p>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8 flex flex-col md:flex-row gap-8">

        <!-- Sidebar / Filters -->
        <aside class="w-full md:w-1/4 bg-white p-6 rounded-xl shadow-sm border border-slate-200 h-fit sticky top-6">
            <div class="flex justify-between items-end mb-4 border-b pb-2">
                <h2 class="text-xl font-bold text-slate-700">Filters</h2>
                <button onclick="resetFilters()" class="text-xs text-blue-600 hover:underline">Reset All</button>
            </div>

            <div class="mb-5">
                <label class="block text-sm font-semibold mb-2 text-slate-600">Sort By</label>
                <select id="sort-order" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
                    <option value="year-desc">Year (Newest First)</option>
                    <option value="year-asc">Year (Oldest First)</option>
                    <option value="diff-desc">Difficulty (Hardest First)</option>
                    <option value="diff-asc">Difficulty (Easiest First)</option>
                </select>
            </div>

            <div class="mb-5">
                <label class="block text-sm font-semibold mb-2 text-slate-600">Search</label>
                <input type="text" id="searchTags" placeholder="Keywords..." class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
            </div>

            <div class="mb-5">
                <label class="block text-sm font-semibold mb-2 text-slate-600">Year Range</label>
                <div class="flex space-x-2">
                    <input type="number" id="year-min" placeholder="2000" class="w-1/2 px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
                    <input type="number" id="year-max" placeholder="2026" class="w-1/2 px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
                </div>
            </div>

            <div class="mb-5">
                <label class="block text-sm font-semibold mb-2 text-slate-600">Key Theorems</label>
                <select id="filter-theorem" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
                    <option value="All">All Theorems</option>
                </select>
            </div>

            <div class="mb-5">
                <label class="block text-sm font-semibold mb-2 text-slate-600">Competition</label>
                <div class="space-y-2 text-sm" id="filter-comp">
                    <label class="flex items-center"><input type="checkbox" value="IMO" class="form-checkbox text-blue-600 mr-2" checked> IMO</label>
                    <label class="flex items-center"><input type="checkbox" value="USAMO" class="form-checkbox text-blue-600 mr-2" checked> USAMO</label>
                    <label class="flex items-center"><input type="checkbox" value="USAJMO" class="form-checkbox text-blue-600 mr-2" checked> USAJMO</label>
                </div>
            </div>

            <div class="mb-5">
                <label class="block text-sm font-semibold mb-2 text-slate-600">Problem Type</label>
                <div class="space-y-2 text-sm" id="filter-type">
                    <label class="flex items-center"><input type="checkbox" value="Algebra" class="form-checkbox mr-2" checked> Algebra</label>
                    <label class="flex items-center"><input type="checkbox" value="Combinatorics" class="form-checkbox mr-2" checked> Combinatorics</label>
                    <label class="flex items-center"><input type="checkbox" value="Geometry" class="form-checkbox mr-2" checked> Geometry</label>
                    <label class="flex items-center"><input type="checkbox" value="Number Theory" class="form-checkbox mr-2" checked> Number Theory</label>
                </div>
            </div>

            <div class="mb-2">
                <label class="block text-sm font-semibold mb-2 text-slate-600">MOHS Rating</label>
                <select id="filter-difficulty" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm">
                    <option value="All">All Ratings</option>
                    <option value="0-15">0M - 15M (Easy)</option>
                    <option value="20-25">20M - 25M (Medium)</option>
                    <option value="30-40">30M - 40M (Hard)</option>
                    <option value="45+">45M+ (Brutal)</option>
                    <option value="Unrated">Unrated (USAJMO)</option>
                </select>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="w-full md:w-3/4" id="main-content">
            <div class="mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <div>
                    <h2 class="text-xl font-bold text-slate-800" id="result-count">Loading Problems...</h2>
                    <p class="text-sm text-slate-500" id="result-showing">Connecting to Database...</p>
                </div>

                <div class="mt-4 sm:mt-0 flex flex-wrap items-center gap-4">
                    <button onclick="toggleAllStrategies()" class="flex items-center px-3 py-1.5 bg-blue-100 hover:bg-blue-200 text-blue-800 text-sm font-semibold rounded border border-blue-200 transition shadow-sm">
                        <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                        <span id="global-strategy-text">Show All Strategies</span>
                    </button>

                    <div class="flex items-center space-x-2">
                        <label class="text-sm font-semibold text-slate-600">Per page:</label>
                        <select id="items-per-page" class="px-3 py-1.5 border rounded-md focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm outline-none cursor-pointer">
                            <option value="15" selected>15</option>
                            <option value="30">30</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="problems-container" class="space-y-6"></div>
            <div id="pagination-controls" class="mt-8 mb-12 flex justify-center items-center space-x-3"></div>
        </main>
    </div>

    <script>
        // ON-SCREEN CRASH REPORTER
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const container = document.getElementById('problems-container');
            if (container) {
                document.getElementById('result-count').innerText = "System Crash";
                document.getElementById('result-showing').innerText = "A fatal error occurred.";
                container.innerHTML = `
                    <div class="bg-red-50 border-l-4 border-red-600 p-6 rounded-xl shadow-md text-red-900">
                        <h3 class="font-bold text-lg mb-2">🛑 Fatal JavaScript Error</h3>
                        <p class="mb-1"><b>Error:</b> ${msg}</p>
                        <p class="mb-4"><b>Line:</b> ${lineNo}</p>
                        <p class="text-sm">Please copy this error message and show it to the AI to fix it.</p>
                    </div>`;
            }
            return false;
        };

        let rawDatabase = [];
        let filteredProblems = [];
        let currentPage = 1;
        let itemsPerPage = 15;
        let showAllStrategies = false;

        const typeColors = {
            "Algebra": "bg-blue-100 text-blue-800", "Combinatorics": "bg-purple-100 text-purple-800",
            "Geometry": "bg-pink-100 text-pink-800", "Number Theory": "bg-orange-100 text-orange-800",
            "Uncategorized": "bg-slate-100 text-slate-800"
        };

        function getDiffStyle(diffString) {
            if (diffString === "Unrated") return "bg-slate-100 text-slate-800 border-slate-200";
            const val = parseInt(diffString);
            if (val <= 15) return "bg-emerald-100 text-emerald-800 border-emerald-200";
            if (val <= 25) return "bg-blue-100 text-blue-800 border-blue-200";
            if (val <= 40) return "bg-amber-100 text-amber-800 border-amber-200";
            return "bg-rose-100 text-rose-800 border-rose-200";
        }

        const container = document.getElementById('problems-container');
        const countDisplay = document.getElementById('result-count');
        const showingDisplay = document.getElementById('result-showing');
        const paginationControls = document.getElementById('pagination-controls');
        const theoremSelect = document.getElementById('filter-theorem');

        const searchInput = document.getElementById('searchTags');
        const minYearInput = document.getElementById('year-min');
        const maxYearInput = document.getElementById('year-max');
        const sortSelect = document.getElementById('sort-order');
        const compInputs = document.querySelectorAll('#filter-comp input');
        const typeInputs = document.querySelectorAll('#filter-type input');
        const diffSelect = document.getElementById('filter-difficulty');
        const itemsPerPageSelect = document.getElementById('items-per-page');

        function populateTheoremsDropdown(data) {
            const allTheorems = new Set();
            data.forEach(p => {
                if (p.key_theorems) {
                    p.key_theorems.forEach(th => allTheorems.add(th));
                }
            });
            const sortedTheorems = Array.from(allTheorems).sort();
            sortedTheorems.forEach(th => {
                const opt = document.createElement('option');
                opt.value = th; opt.innerText = th;
                theoremSelect.appendChild(opt);
            });
        }

        function getMohsVal(diff) {
            if (diff === "Unrated") return -1;
            return parseInt(diff) || 0;
        }

        window.toggleStrategy = function(id) {
            const content = document.getElementById(`strategy-content-${id}`);
            const icon = document.getElementById(`strategy-icon-${id}`);
            content.classList.toggle('hidden');
            content.classList.toggle('block');
            icon.classList.toggle('rotate-90');
        };

        window.toggleAllStrategies = function() {
            showAllStrategies = !showAllStrategies;
            document.getElementById('global-strategy-text').innerText = showAllStrategies ? 'Hide All Strategies' : 'Show All Strategies';
            const pageSlice = filteredProblems.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);
            pageSlice.forEach(p => {
                const content = document.getElementById(`strategy-content-${p.id}`);
                const icon = document.getElementById(`strategy-icon-${p.id}`);
                if (content && icon) {
                    if (showAllStrategies) {
                        content.classList.remove('hidden'); content.classList.add('block'); icon.classList.add('rotate-90');
                    } else {
                        content.classList.add('hidden'); content.classList.remove('block'); icon.classList.remove('rotate-90');
                    }
                }
            });
        };

        function updatePaginationUI() {
            const totalItems = filteredProblems.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, totalItems);

            renderProblemsHTML(filteredProblems.slice(startIndex, endIndex));

            countDisplay.innerText = `${totalItems} Problem${totalItems === 1 ? '' : 's'} Found`;
            if (totalItems === 0) {
                showingDisplay.innerText = `Showing 0 items`;
                paginationControls.innerHTML = '';
            } else {
                showingDisplay.innerText = `Showing ${startIndex + 1} - ${endIndex} of ${totalItems}`;
                renderPaginationButtons(totalPages);
            }
        }

        function renderProblemsHTML(problems) {
            container.innerHTML = '';
            if (problems.length === 0) {
                container.innerHTML = `<div class="text-center p-8 bg-white rounded-xl shadow-sm"><p class="text-slate-500">No matches found for your current filters.</p></div>`;
                return;
            }

            const initDisplay = showAllStrategies ? "block" : "hidden";
            const initRotate = showAllStrategies ? "rotate-90" : "";

            problems.forEach(p => {
                const tagsHtml = p.tags ? p.tags.map(tag => `<span class="inline-block border border-slate-200 text-slate-500 px-2 py-1 rounded text-xs font-medium mr-2 mb-2 bg-slate-50">#${tag}</span>`).join('') : '';
                const theoremsHtml = (p.key_theorems && p.key_theorems.length > 0)
                    ? p.key_theorems.map(th => `<span class="inline-block border border-amber-300 text-amber-800 px-2 py-1 rounded text-xs font-bold mr-2 mb-2 bg-amber-100 shadow-sm">🔑 ${th}</span>`).join('') : '';

                const typeStyle = typeColors[p.type] || typeColors["Uncategorized"];
                const diffStyle = getDiffStyle(p.difficulty);

                container.innerHTML += `
                    <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-blue-600 transition hover:shadow-md">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-3">
                            <h3 class="text-xl font-bold text-slate-900">${p.competition} ${p.year} — Problem ${p.number}</h3>
                            <span class="px-3 py-1 mt-2 md:mt-0 rounded text-xs font-bold uppercase border ${diffStyle}">${p.difficulty}</span>
                        </div>
                        <div class="mb-4 flex flex-wrap items-center">
                            <span class="px-3 py-1 rounded text-xs font-bold mr-3 mb-2 ${typeStyle} shadow-sm">${p.type}</span>
                            ${theoremsHtml}
                            ${tagsHtml}
                        </div>

                        <div class="prose max-w-none text-slate-800 mb-6 bg-slate-50 p-5 rounded-lg border border-slate-200 math-scroll text-lg leading-relaxed">
                            ${p.statement}
                        </div>

                        <div class="mb-6">
                            <button onclick="toggleStrategy(${p.id})" class="flex items-center text-sm font-bold text-blue-700 hover:text-blue-900 transition focus:outline-none tracking-wide">
                                <svg id="strategy-icon-${p.id}" class="w-4 h-4 mr-1.5 transition-transform duration-200 transform ${initRotate}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                                💡 VIEW SOLUTION STRATEGY
                            </button>
                            <div id="strategy-content-${p.id}" class="${initDisplay} mt-3 bg-blue-50/50 border border-blue-100 p-5 rounded-lg overflow-hidden">
                                <p class="text-sm text-blue-800 leading-relaxed">${p.strategy}</p>
                            </div>
                        </div>

                        <a href="${p.link}" target="_blank" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold py-2 px-4 rounded shadow transition inline-flex">
                            Official Problem & Solution
                        </a>
                    </div>`;
            });

            if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise();
        }

        function renderPaginationButtons(totalPages) {
            const prevClass = currentPage === 1 ? 'disabled cursor-not-allowed opacity-50' : 'hover:bg-slate-100 hover:text-blue-600';
            const nextClass = currentPage === totalPages ? 'disabled cursor-not-allowed opacity-50' : 'hover:bg-slate-100 hover:text-blue-600';

            paginationControls.innerHTML = `
                <button onclick="changePage(${currentPage - 1})" class="px-4 py-2 bg-white border border-slate-300 text-slate-700 rounded-lg shadow-sm font-semibold transition ${prevClass}">&larr; Previous</button>
                <div class="px-4 py-2 bg-slate-100 border border-slate-200 text-slate-700 rounded-lg shadow-inner font-medium text-sm">
                    Page <span class="font-bold text-blue-700">${currentPage}</span> of ${totalPages}
                </div>
                <button onclick="changePage(${currentPage + 1})" class="px-4 py-2 bg-white border border-slate-300 text-slate-700 rounded-lg shadow-sm font-semibold transition ${nextClass}">Next &rarr;</button>
            `;
        }

        window.changePage = function(newPage) {
            const totalPages = Math.ceil(filteredProblems.length / itemsPerPage);
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                updatePaginationUI();
                document.getElementById('main-content').scrollIntoView({ behavior: 'smooth' });
            }
        };

        function applyFilters() {
            const activeComps = Array.from(compInputs).filter(i => i.checked).map(i => i.value);
            const activeTypes = Array.from(typeInputs).filter(i => i.checked).map(i => i.value);
            const diffFilter = diffSelect.value;
            const search = searchInput.value.toLowerCase();
            const minYear = parseInt(minYearInput.value) || 0;
            const maxYear = parseInt(maxYearInput.value) || 3000;
            const thFilter = theoremSelect.value;
            const sortMode = sortSelect.value;

            filteredProblems = rawDatabase.filter(p => {
                if (!activeComps.includes(p.competition)) return false;
                if (!activeTypes.includes(p.type)) return false;
                if (p.year < minYear || p.year > maxYear) return false;

                if (thFilter !== "All") {
                    if (!p.key_theorems || !p.key_theorems.includes(thFilter)) return false;
                }

                if (diffFilter !== "All") {
                    if (diffFilter === "Unrated" && p.difficulty !== "Unrated") return false;
                    if (diffFilter !== "Unrated") {
                        if (p.difficulty === "Unrated") return false;
                        const val = parseInt(p.difficulty);
                        if (diffFilter === "0-15" && val > 15) return false;
                        if (diffFilter === "20-25" && (val < 20 || val > 25)) return false;
                        if (diffFilter === "30-40" && (val < 30 || val > 40)) return false;
                        if (diffFilter === "45+" && val < 45) return false;
                    }
                }

                if (search) {
                    return (p.tags && p.tags.some(t => t.toLowerCase().includes(search))) ||
                           (p.statement && p.statement.toLowerCase().includes(search)) ||
                           (p.strategy && p.strategy.toLowerCase().includes(search));
                }
                return true;
            });

            filteredProblems.sort((a, b) => {
                if (sortMode === 'year-desc') return b.year - a.year || b.number - a.number;
                if (sortMode === 'year-asc') return a.year - b.year || a.number - b.number;

                const mohsA = getMohsVal(a.difficulty);
                const mohsB = getMohsVal(b.difficulty);

                if (sortMode === 'diff-desc') return mohsB - mohsA || b.year - a.year;
                if (sortMode === 'diff-asc') {
                    if (mohsA === -1 && mohsB !== -1) return 1;
                    if (mohsB === -1 && mohsA !== -1) return -1;
                    return mohsA - mohsB || b.year - a.year;
                }
                return 0;
            });

            currentPage = 1;
            updatePaginationUI();
        }

        window.resetFilters = function() {
            compInputs.forEach(i => i.checked = true);
            typeInputs.forEach(i => i.checked = true);
            diffSelect.value = "All";
            theoremSelect.value = "All";
            searchInput.value = "";
            minYearInput.value = "";
            maxYearInput.value = "";
            sortSelect.value = "year-desc";
            itemsPerPageSelect.value = "15";
            itemsPerPage = 15;
            applyFilters();
        };

        // FIXED: Explicitly added a semicolon before the array brackets to prevent JS ASI crashing!
        ;[...compInputs, ...typeInputs, diffSelect, theoremSelect, sortSelect].forEach(i => i.addEventListener('change', applyFilters));
        searchInput.addEventListener('input', applyFilters);
        minYearInput.addEventListener('input', applyFilters);
        maxYearInput.addEventListener('input', applyFilters);
        itemsPerPageSelect.addEventListener('change', (e) => { itemsPerPage = parseInt(e.target.value); applyFilters(); });

        document.addEventListener("DOMContentLoaded", async () => {
            try {
                const cacheBusterUrl = 'problems_output.json?time=' + new Date().getTime();
                const response = await fetch(cacheBusterUrl);

                if (!response.ok) {
                    throw new Error(`HTTP Fetch failed with status: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();

                if (!Array.isArray(data)) {
                    throw new Error("Parsed JSON successfully, but it was not an Array format as expected.");
                }

                rawDatabase = data;
                populateTheoremsDropdown(data);
                applyFilters();

            } catch (error) {
                document.getElementById('result-count').innerText = "Data Loading Failed";
                document.getElementById('result-showing').innerText = "Please review the error below.";

                container.innerHTML = `
                    <div class="bg-amber-50 border-l-4 border-amber-500 p-6 rounded-xl shadow-sm text-amber-900">
                        <h3 class="font-bold text-lg mb-2">⚠️ Could not load the problem database</h3>
                        <p class="mb-4 text-amber-800">${error.message}</p>
                        <button onclick="location.reload()" class="px-4 py-2 bg-amber-600 text-white rounded font-bold shadow hover:bg-amber-700">Refresh Page</button>
                    </div>
                `;
                console.error(error);
            }
        });
    </script>
</body>
</html>
